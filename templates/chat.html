<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Brain Byte AI Chat</title>

<!-- MARKDOWN FORMATTER -->

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#07111f;

    color:white;

    padding:40px;
}

.container{

    max-width:1000px;

    margin:auto;
}

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;
}

.title{

    font-size:42px;

    font-weight:bold;

    color:#00e5ff;
}

.filename{

    margin-top:10px;

    color:#8fc8ff;

    font-size:18px;
}

.back-btn{

    text-decoration:none;

    background:#10263f;

    color:white;

    padding:14px 24px;

    border-radius:12px;

    transition:0.3s;
}

.back-btn:hover{

    background:#1b3d63;

    transform:translateY(-2px);
}

.chat-box{

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:25px;

    padding:30px;

    min-height:500px;

    max-height:600px;

    overflow-y:auto;

    box-shadow:
    0 0 25px rgba(0,0,0,0.35);

    margin-bottom:30px;
}

.message{

    margin-bottom:25px;

    padding:20px;

    border-radius:18px;

    line-height:1.8;

    font-size:18px;

    animation:fadeIn 0.3s ease;

    position:relative;
}

.user{

    background:
    linear-gradient(
        135deg,
        #0066ff,
        #0099ff
    );

    margin-left:120px;
}

.user .message-actions{
    margin-top: 12px;
    display: flex;
    gap: 10px;
}

.user .edit-btn,
.user .delete-btn{
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.user .edit-btn:hover,
.user .delete-btn:hover{
    background: rgba(255,255,255,0.35);
}

.ai{

    background:
    linear-gradient(
        135deg,
        #183554,
        #10263f
    );

    margin-right:120px;
}

.ai h1,
.ai h2,
.ai h3{

    color:#00e5ff;

    margin-bottom:15px;
}

.ai ul{

    margin-left:25px;

    margin-top:12px;
}

.ai li{

    margin-bottom:10px;
}

.ai strong{

    color:#00ff95;
}

/* ── MESSAGE EDITING ── */
.edit-mode{
    background: rgba(255,255,255,0.1) !important;
    border: 2px solid #00e5ff !important;
}

.edit-input-area{
    margin-top: 12px;
    display: flex;
    gap: 10px;
}

.edit-input-area input{
    flex: 1;
    padding: 10px 15px;
    border: 1px solid #00e5ff;
    border-radius: 8px;
    background: #06101f;
    color: white;
    font-size: 15px;
    outline: none;
}

.edit-input-area button{
    padding: 8px 16px;
    background: #00e5ff;
    border: none;
    border-radius: 8px;
    color: #07111f;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.edit-input-area button:hover{
    background: #00ffff;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

.input-area{

    display:flex;

    gap:18px;
}

input{

    flex:1;

    padding:20px;

    border:none;

    border-radius:18px;

    background:#10263f;

    color:white;

    font-size:18px;

    outline:none;
}

input::placeholder{

    color:#8fc8ff;
}

.button-group{
    display: flex;
    gap: 10px;
}

button{

    border:none;

    padding:18px 30px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #00c853,
        #00e676
    );

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 20px rgba(0,255,149,0.35);
}

.mic-btn{
    background: linear-gradient(135deg, #00bfff, #0099ff);
    padding: 18px 25px;
    border-radius: 18px;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
    flex-shrink: 0;
}

.mic-btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(0,191,255,0.4);
}

.mic-btn.listening{
    background: linear-gradient(135deg, #ff1744, #ff5252);
    box-shadow: 0 0 20px rgba(255,23,68,0.5);
    animation: pulse-mic 1s infinite;
}

@keyframes pulse-mic{
    0%, 100%{ box-shadow: 0 0 20px rgba(255,23,68,0.5); }
    50%{ box-shadow: 0 0 30px rgba(255,23,68,0.8); }
}

.welcome-box{

    background:
    linear-gradient(
        135deg,
        rgba(0,229,255,0.12),
        rgba(0,255,149,0.08)
    );

    border:
    1px solid rgba(0,229,255,0.2);

    padding:25px;

    border-radius:20px;

    margin-bottom:25px;
}

.welcome-box h2{

    color:#00e5ff;

    margin-bottom:12px;

    font-size:28px;
}

.welcome-box p{

    line-height:1.8;

    color:#d8ecff;

    font-size:17px;
}



.loading{

    display:flex;

    align-items:center;

    gap:10px;
}

.dot{

    width:10px;

    height:10px;

    border-radius:50%;

    background:#00e5ff;

    animation:bounce 0.6s infinite alternate;
}

.dot:nth-child(2){

    animation-delay:0.2s;
}

.dot:nth-child(3){

    animation-delay:0.4s;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-8px);
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:900px){

    body{
        padding:20px;
    }

    .chat-box{
        padding:20px;
    }

    .message{
        font-size:16px;
        padding:16px;
    }

    .user{
        margin-left:40px;
        margin-right:0;
    }

    .ai{
        margin-right:40px;
        margin-left:0;
    }

    .title{
        font-size:28px;
    }

    .filename{
        font-size:14px;
    }

    .top-bar{
        flex-direction:column;
        gap:12px;
        align-items:flex-start;
    }

    .back-btn{
        padding:10px 18px;
        font-size:14px;
    }

}

@media(max-width:600px){

    body{
        padding:12px;
    }

    .container{
        max-width:100%;
    }

    .chat-box{
        padding:16px;
        margin-bottom:16px;
        border-radius:16px;
    }

    .message{
        margin-bottom:16px;
        padding:12px;
        font-size:14px;
        line-height:1.6;
        margin-left:0 !important;
        margin-right:0 !important;
        border-radius:12px;
    }

    .user{
        background: linear-gradient(135deg, #0066ff, #0099ff);
    }

    .ai{
        background: linear-gradient(135deg, #183554, #10263f);
    }

    .user .message-actions{
        flex-wrap:wrap;
    }

    .user .edit-btn,
    .user .delete-btn{
        font-size:12px;
        padding:5px 10px;
    }

    .title{
        font-size:22px;
    }

    .filename{
        font-size:12px;
        margin-top:6px;
    }

    .welcome-box{
        padding:16px;
        margin-bottom:16px;
    }

    .welcome-box h2{
        font-size:20px;
        margin-bottom:10px;
    }

    .welcome-box p{
        font-size:14px;
    }

    .input-area{
        gap:10px;
        flex-direction:column;
    }

    input{
        padding:14px;
        font-size:16px;
    }

    .button-group{
        gap:8px;
    }

    button{
        padding:12px 20px;
        font-size:14px;
        flex:1;
    }

    .mic-btn{
        padding:12px 16px;
        font-size:16px;
    }

    .edit-input-area{
        flex-direction:column;
        gap:8px;
    }

    .edit-input-area input{
        font-size:14px;
        padding:10px;
    }

    .edit-input-area button{
        padding:8px 12px;
        font-size:12px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">

<div>

<div class="title">

AI Chat With PDF

</div>

<div class="filename">

{{ filename }}

</div>

</div>

<a href="/my_notes"
class="back-btn">

← My Notes

</a>

</div>

<div class="welcome-box">

<h2>

Ask Anything From Your PDF

</h2>

<p>

Ask doubts, explanations, summaries, definitions, concepts, important questions, or exam topics directly from your uploaded PDF. Edit your messages or use the microphone to speak your questions!

</p>

</div>



<div class="chat-box"
id="chatBox">

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask anything from PDF...">

<div class="button-group">
    <button
    class="mic-btn"
    id="micBtn"
    onclick="toggleMicrophone()"
    title="Click to speak">
        🎤
    </button>

    <button
    onclick="sendMessage()">
        Send
    </button>
</div>

</div>

</div>

<script>

// ══════════════════════════════
// WEB SPEECH API - MICROPHONE
// ══════════════════════════════

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = function(){
        isListening = true;
        document.getElementById('micBtn').classList.add('listening');
        document.getElementById('micBtn').textContent = '🎙️';
    };

    recognition.onresult = function(event){
        let transcript = '';
        for(let i = event.resultIndex; i < event.results.length; i++){
            transcript += event.results[i][0].transcript;
        }
        document.getElementById('userInput').value = transcript;
    };

    recognition.onend = function(){
        isListening = false;
        document.getElementById('micBtn').classList.remove('listening');
        document.getElementById('micBtn').textContent = '🎤';
    };

    recognition.onerror = function(event){
        console.error('Speech recognition error:', event.error);
        document.getElementById('micBtn').classList.remove('listening');
        document.getElementById('micBtn').textContent = '🎤';
        isListening = false;
    };
}

function toggleMicrophone(){
    if(!recognition){
        alert('Speech Recognition not supported in your browser. Use Chrome, Edge, or Safari.');
        return;
    }

    if(isListening){
        recognition.stop();
        isListening = false;
    } else {
        recognition.start();
    }
}

// ══════════════════════════════
// MESSAGE MANAGEMENT
// ══════════════════════════════

let messageHistory = [];

function quickAsk(question){
    document.getElementById("userInput").value = question;
    sendMessage();
}

async function sendMessage(){
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if(!message){
        return;
    }

    const chatBox = document.getElementById("chatBox");

    // USER MESSAGE
    const userMsgDiv = document.createElement("div");
    userMsgDiv.className = "message user";
    userMsgDiv.innerHTML = `
        <div class="message-content">${message}</div>
        <div class="message-actions">
            <button class="edit-btn" onclick="editMessage(this, '${escapeHtml(message)}')">Edit</button>
            <button class="delete-btn" onclick="deleteMessage(this)">Delete</button>
        </div>
    `;
    chatBox.appendChild(userMsgDiv);

    messageHistory.push({type: 'user', content: message});
    input.value = "";

    // LOADING
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "message ai";
    loadingDiv.id = "loading";
    loadingDiv.innerHTML = `
        <div class="loading">
            <span>Thinking</span>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try{
        const response = await fetch("/ask_ai", {
            method:"POST",
            headers:{"Content-Type": "application/json"},
            body:JSON.stringify({
                question: message,
                filename: "{{ filename }}"
            })
        });

        const data = await response.json();
        loadingDiv.remove();

        // AI RESPONSE
        const aiMsgDiv = document.createElement("div");
        aiMsgDiv.className = "message ai";
        aiMsgDiv.innerHTML = marked.parse(data.answer);
        chatBox.appendChild(aiMsgDiv);

        messageHistory.push({type: 'ai', content: data.answer});
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch(error){
        loadingDiv.remove();
        const errorDiv = document.createElement("div");
        errorDiv.className = "message ai";
        errorDiv.innerHTML = "Error while generating response.";
        chatBox.appendChild(errorDiv);
    }
}

// ══════════════════════════════
// EDIT MESSAGE
// ══════════════════════════════

function editMessage(btn, originalText){
    const messageDiv = btn.closest('.message');
    const contentDiv = messageDiv.querySelector('.message-content');
    
    if(messageDiv.classList.contains('edit-mode')){
        return;
    }

    messageDiv.classList.add('edit-mode');
    
    const editHTML = `
        <div class="edit-input-area">
            <input type="text" class="edit-input" value="${originalText}">
            <button onclick="saveEdit(this)">Save</button>
            <button onclick="cancelEdit(this)" style="background: linear-gradient(135deg, #ff6b6b, #ff8a8a);">Cancel</button>
        </div>
    `;
    
    messageDiv.appendChild(document.createRange().createContextualFragment(editHTML));
    document.querySelector('.edit-input').focus();
}

async function saveEdit(btn){

    const messageDiv = btn.closest('.message');
    const newText = messageDiv.querySelector('.edit-input').value.trim();

    if(!newText){
        return;
    }

    messageDiv.querySelector('.message-content').textContent = newText;

    messageDiv.classList.remove('edit-mode');
    messageDiv.querySelector('.edit-input-area').remove();

    const chatBox = document.getElementById("chatBox");

    const allMessages = Array.from(
        document.querySelectorAll("#chatBox .message")
    );

    const editIndex = allMessages.indexOf(messageDiv);

    for(let i = allMessages.length - 1; i > editIndex; i--){
        allMessages[i].remove();
    }

    const loadingDiv = document.createElement("div");

    loadingDiv.className = "message ai";

    loadingDiv.innerHTML = `
        <div class="loading">
            <span>Thinking</span>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;

    chatBox.appendChild(loadingDiv);

    try{

        const response = await fetch("/ask_ai",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                question:newText,
                filename:"{{ filename }}"
            })
        });

        const data = await response.json();

        loadingDiv.remove();

        const aiMsgDiv = document.createElement("div");

        aiMsgDiv.className = "message ai";

        aiMsgDiv.innerHTML = marked.parse(data.answer);

        chatBox.appendChild(aiMsgDiv);

        chatBox.scrollTop = chatBox.scrollHeight;

    }catch(error){

        loadingDiv.remove();

        const errorDiv = document.createElement("div");

        errorDiv.className = "message ai";

        errorDiv.innerHTML =
            "Error while regenerating response.";

        chatBox.appendChild(errorDiv);
    }
}

function cancelEdit(btn){
    const messageDiv = btn.closest('.message');
    messageDiv.classList.remove('edit-mode');
    messageDiv.querySelector('.edit-input-area').remove();
}

// ══════════════════════════════
// DELETE MESSAGE
// ══════════════════════════════

function deleteMessage(btn){

    const messageDiv = btn.closest('.message');

    const allMessages = Array.from(
        document.querySelectorAll('#chatBox .message')
    );

    const deleteIndex = allMessages.indexOf(messageDiv);

    for(let i = allMessages.length - 1; i >= deleteIndex; i--){
        allMessages[i].remove();
    }
}

// ══════════════════════════════
// HELPER
// ══════════════════════════════

function escapeHtml(text){
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

// ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>

</html>
