<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Brain Byte AI Summary</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#07111f;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            padding:40px;
            transition:0.3s;
        }

        body.light-mode{
            background:#f0f4f8;
            color:#333;
        }

        .container{
            max-width:1100px;
            margin:auto;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap:20px;
        }

        .left-section{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .title{
            font-size:40px;
            font-weight:bold;
            color:#4da6ff;
        }

        body.light-mode .title{
            color:#0066cc;
        }

        .theme-toggle{
            padding:10px 16px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.2);
            background:rgba(255,255,255,0.08);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        body.light-mode .theme-toggle{
            border-color:#ccc;
            background:#fff;
            color:#333;
        }

        .theme-toggle:hover{
            transform:scale(1.05);
        }

        .back-btn{
            text-decoration:none;
            background:#10263f;
            color:white;
            padding:12px 20px;
            border-radius:12px;
            transition:0.3s;
        }

        body.light-mode .back-btn{
            background:#ccc;
            color:#333;
        }

        .back-btn:hover{
            background:#1b3d63;
        }

        body.light-mode .back-btn:hover{
            background:#aaa;
        }

        .summary-card{
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:40px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        body.light-mode .summary-card{
            background:#fff;
            border:1px solid #ddd;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .file-name{
            color:#9dcfff;
            margin-bottom:30px;
            font-size:18px;
        }

        body.light-mode .file-name{
            color:#0066cc;
        }

        h1,h2,h3{
            color:#4da6ff;
            margin-top:25px;
            margin-bottom:15px;
        }

        body.light-mode h1,
        body.light-mode h2,
        body.light-mode h3{
            color:#0066cc;
        }

        p{
            line-height:1.9;
            margin-bottom:15px;
            color:#e5e5e5;
        }

        body.light-mode p{
            color:#333;
        }

        ul{
            margin-left:25px;
            margin-bottom:20px;
        }

        li{
            margin-bottom:10px;
            line-height:1.8;
        }

        body.light-mode li{
            color:#333;
        }

        strong{
            color:white;
        }

        body.light-mode strong{
            color:#000;
        }

        hr{
            border:none;
            height:1px;
            background:rgba(255,255,255,0.1);
            margin:30px 0;
        }

        body.light-mode hr{
            background:#ddd;
        }

        /* BUTTONS */
        .button-group{
            display:flex;
            gap:16px;
            justify-content:center;
            margin:30px 0 0 0;
            flex-wrap:wrap;
        }

        .copy-btn,
        .pdf-btn{
            padding:14px 40px;
            border-radius:12px;
            border:none;
            color:white;
            font-size:16px;
            font-weight:700;
            font-family:Arial, Helvetica, sans-serif;
            cursor:pointer;
            transition:0.3s;
        }

        .copy-btn{
            background:linear-gradient(90deg,#12d8fa,#1b6cff);
        }

        .pdf-btn{
            background:linear-gradient(90deg,#ff9800,#ff5722);
        }

        .copy-btn:hover,
        .pdf-btn:hover{
            transform:scale(1.03);
            box-shadow:0 0 20px rgba(0,217,255,0.4);
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <div class="left-section">
                <div class="title">
                    🤖 AI Summary
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>

            <a href="/my_notes" class="back-btn">
               ← My Notes
            </a>

        </div>

        <div class="summary-card">

            <div class="file-name">
                AI Generated Summary
                <br><br>
                <strong>{{ filename }}</strong>
            </div>

            <hr>

            <div class="summary-content" id="summaryContent">
                {{ summary | safe }}
            </div>

        </div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button class="copy-btn" id="copyBtn" onclick="copySummary()">
                📋 Copy Summary
            </button>
            <button class="pdf-btn" id="pdfBtn" onclick="downloadPDF()">
                📥 Download as PDF
            </button>
        </div>

    </div>

    <script>
        const filename = "{{ filename }}";

        function toggleTheme(){
            document.body.classList.toggle("light-mode");
            localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
        }

        function copySummary(){
            const text = document.getElementById("summaryContent").innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById("copyBtn");
                btn.textContent = "✅ Copied!";
                setTimeout(() => { btn.textContent = "📋 Copy Summary"; }, 2000);
            }).catch(() => {
                alert("Could not copy. Try manually selecting the text.");
            });
        }

        function downloadPDF(){
            const element = document.getElementById("summaryContent");
            const opt = {
                margin: 10,
                filename: filename.replace(/\.[^/.]+$/, "") + '_summary.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Load theme on page load
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem("theme");
            if(savedTheme === "light"){
                document.body.classList.add("light-mode");
            }
        });
    </script>

</body>

</html>
